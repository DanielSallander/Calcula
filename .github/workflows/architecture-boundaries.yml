# Architecture boundary gate.
#
# Enforces Calcula's microkernel boundaries (see ARCHITECTURE.md + PHILOSOPHY.md):
#   - Alien Rule     : Core never imports Shell or Extensions
#   - Facade Rule    : Extensions import only through src/api
#   - API neutrality : src/api never imports a specific extension
#   - Sibling isolation : Extensions never import each other's internals
#
# Runs ONLY the boundary rules (npm run lint:boundaries -> eslint.config.boundaries.js),
# deliberately separate from the full `eslint .` so unrelated style/type lint
# debt cannot mask a real boundary regression. The Alien + Facade rules fail the
# build today; API-neutrality and sibling-isolation are staged to error as the
# Wave A remediation lands (see eslint.boundaries.js BOUNDARY_SEVERITY).
name: Architecture Boundaries

on:
  push:
    branches: [main]
  pull_request:

jobs:
  boundaries:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json
      - run: npm ci
      - run: npm run lint:boundaries
