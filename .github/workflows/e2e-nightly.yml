# End-to-end + soak suites — MANUAL and NIGHTLY only (never gates a PR).
#
# WHY NOT GitHub-hosted: these launch the real app (`cargo tauri dev`) and drive
# the live WebView2 over CDP. GitHub's Linux runners have no WebView2, and
# app/e2e/global-setup.ts hardcodes THIS machine's ARM64 MSVC toolchain paths
# (VS BuildTools Hostx64\arm64, Windows SDK 10.0.26100.0) — so windows-latest
# (x64) cannot build it either. They therefore run on a SELF-HOSTED Windows
# runner with the app's toolchain installed (i.e. a dev box). To run these on
# GitHub-hosted windows, global-setup.ts would first need its MSVC env
# auto-detected instead of hardcoded.
#
# Triggered by hand (workflow_dispatch) or nightly (schedule) so the fast PR
# gates (architecture-boundaries.yml + ci.yml) stay quick and host-agnostic.
name: E2E & Soak (manual / nightly)

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *" # 03:00 UTC nightly

jobs:
  e2e:
    runs-on: [self-hosted, windows]
    timeout-minutes: 60
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json
      - run: npm ci
      # The functional suite shares ONE app instance (worker-scoped fixture);
      # global-setup launches `cargo tauri dev` with WebView2 CDP itself.
      - run: npm run e2e
      - name: Upload e2e report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: app/playwright-report
          if-no-files-found: ignore

  soak:
    runs-on: [self-hosted, windows]
    timeout-minutes: 45
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json
      - run: npm ci
      # Quick mode (~15 min): walks + oracle battery (recalc / undo / save-reload).
      # Use --mode=overnight for the deep run.
      - run: npm run soak
      - name: Upload soak results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: soak-results
          path: app/e2e/results
          if-no-files-found: ignore
